# OrRBAC (Or Role-Based Access Control) model with domain support.
# Each request carries: subject (user ID), domain (global or group ID), object, action.
[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

# Role assignments are domain-scoped: (user_id, role_name, domain)
[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

# Matchers:
# 1. g(r.sub, "admin", "global") - any user with the global "admin" role bypasses all checks.
# 2. Standard domain-based RBAC match: user must have matching role in the same domain.
[matchers]
m = g(r.sub, "admin", "global") || (g(r.sub, p.sub, r.dom) && r.dom == p.dom && r.obj == p.obj && r.act == p.act)
